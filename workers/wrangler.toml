# WINAID Rate Limiter Worker
# Pages와 별도로 배포되는 Worker
# 배포: cd workers && wrangler deploy

name = "winaid-rate-limiter"
main = "rate-limiter.ts"
compatibility_date = "2024-12-01"

# KV Namespaces - Cloudflare Dashboard에서 생성 후 ID 입력
# 생성 명령어:
#   wrangler kv namespace create RATE_LIMIT_KV
#   wrangler kv namespace create CACHE_KV

# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "<your-kv-namespace-id>"

# [[kv_namespaces]]
# binding = "CACHE_KV"
# id = "<your-kv-namespace-id>"

# 환경별 설정
# [env.production]
# routes = [{ pattern = "api-limiter.story-darugi.com", custom_domain = true }]
